<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quickroom Deployer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 2rem; max-width: 600px; margin: 0 auto; }
h1 { color: #58a6ff; margin-bottom: 1.5rem; font-size: 1.4rem; }
label { display: block; margin-bottom: 0.3rem; color: #8b949e; font-size: 0.85rem; }
input, select { width: 100%; padding: 0.5rem; margin-bottom: 1rem; background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 0.95rem; }
input[type="file"] { padding: 0.4rem; }
button { background: #238636; color: #fff; border: none; padding: 0.6rem 1.5rem; border-radius: 6px; font-size: 1rem; cursor: pointer; width: 100%; }
button:hover { background: #2ea043; }
button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
#status { margin-top: 1rem; padding: 0.8rem; background: #161b22; border: 1px solid #30363d; border-radius: 6px; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; min-height: 3rem; }
.ok { color: #3fb950; } .err { color: #f85149; } .info { color: #58a6ff; }
</style>
</head>
<body>
<h1>Quickroom Deployer</h1>

<label>GitHub Token</label>
<input type="password" id="token" placeholder="ghp_..." />

<label>Target file (repo root)</label>
<input type="text" id="path" value="this-or-that.html" />

<label>File to deploy</label>
<input type="file" id="file" />

<label>Commit message</label>
<input type="text" id="msg" value="Update via deployer" />

<button id="btn" onclick="deploy()">Deploy</button>
<div id="status"></div>

<script>
const REPO = 'wesritchie/quickroom';

function log(msg, cls) {
  const s = document.getElementById('status');
  const span = document.createElement('span');
  span.className = cls || '';
  span.textContent = msg + '\n';
  s.appendChild(span);
  s.scrollTop = s.scrollHeight;
}

function toBase64(buffer) {
  const bytes = new Uint8Array(buffer);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

async function deploy() {
  const token = document.getElementById('token').value.trim();
  const path = document.getElementById('path').value.trim();
  const fileInput = document.getElementById('file');
  const msg = document.getElementById('msg').value.trim();
  const btn = document.getElementById('btn');
  document.getElementById('status').innerHTML = '';

  if (!token) { log('Token required', 'err'); return; }
  if (!fileInput.files.length) { log('Select a file', 'err'); return; }

  btn.disabled = true;
  const file = fileInput.files[0];
  log('Reading ' + file.name + ' (' + file.size + ' bytes)...', 'info');

  try {
    const buf = await file.arrayBuffer();
    const b64 = toBase64(buf);
    log('Encoded to ' + b64.length + ' base64 chars', 'info');

    const apiPath = path;
    const apiUrl = 'https://api.github.com/repos/' + REPO + '/contents/' + apiPath;
    const headers = { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' };

    log('Fetching current SHA...', 'info');
    let sha = '';
    try {
      const r = await fetch(apiUrl, { headers: { 'Authorization': 'token ' + token } });
      if (r.ok) { sha = (await r.json()).sha; log('Current SHA: ' + sha.slice(0, 7), 'info'); }
      else { log('No existing file (will create)', 'info'); }
    } catch (e) { log('No existing file (will create)', 'info'); }

    log('Pushing to GitHub...', 'info');
    const body = { message: msg, content: b64 };
    if (sha) body.sha = sha;

    const res = await fetch(apiUrl, { method: 'PUT', headers, body: JSON.stringify(body) });
    if (res.ok) {
      const data = await res.json();
      log('Deployed! SHA: ' + data.content.sha.slice(0, 7), 'ok');
      log('Live at: https://wesritchie.github.io/quickroom/' + apiPath, 'ok');
    } else {
      const err = await res.text();
      log('Deploy failed: ' + res.status, 'err');
      log(err, 'err');
    }
  } catch (e) {
    log('Error: ' + e.message, 'err');
  }
  btn.disabled = false;
}
</script>
</body>
</html>
