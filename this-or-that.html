<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yellow Brick Calculator ŌĆö Tree House Craft Cannabis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-card: #1c2129;
  --bg-input: #0d1117;
  --text-primary: #f0f6fc;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --border: #30363d;
  --border-hover: #484f58;
  --accent-orange: #ffa94d;
  --accent-green: #69db7c;
  --accent-blue: #58a6ff;
  --accent-red: #ff6b6b;
  --accent-purple: #bc8cff;
  --accent-teal: #2dd4bf;
  --accent-yellow: #ffd43b;
  --sidebar-width: 220px;
  --font-stack: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: var(--font-stack);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
}
/* Sidebar */
.sidebar {
  position: fixed; top: 0; left: 0; width: var(--sidebar-width);
  height: 100vh; border-right: 1px solid var(--border); z-index: 10;
  display: flex; flex-direction: column; overflow-y: auto;
  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 23px,
      rgba(255,200,60,0.04) 23px,
      rgba(255,200,60,0.04) 24px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 54px,
      rgba(255,200,60,0.03) 54px,
      rgba(255,200,60,0.03) 55px
    ),
    linear-gradient(180deg, #1a1910 0%, #161b22 40%, #0d1117 100%);
}
.sidebar-header {
  padding: 1.25rem 1rem 1rem;
  border-bottom: 1px solid rgba(255,212,59,0.15);
  background: linear-gradient(180deg, rgba(255,200,60,0.06) 0%, transparent 100%);
}
.sidebar-header h1 {
  font-size: 16px; font-weight: 700; letter-spacing: 0.3px;
  background: linear-gradient(135deg, #ffd43b, #ffa94d);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sidebar-header .subtitle {
  font-size: 11px; color: #c9a84c; margin-top: 2px; font-style: italic;
}
.sidebar-header .road-icon {
  display: block; margin-top: 8px; font-size: 18px; letter-spacing: 2px;
  opacity: 0.4;
}
.nav-section { padding: 0.75rem 0; }
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 1rem; cursor: pointer; font-size: 13px;
  color: var(--text-secondary); transition: all 0.15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text-primary); }
.nav-item.active {
  color: var(--accent-yellow); background: rgba(255,212,59,0.08);
  border-left-color: var(--accent-yellow); font-weight: 600;
}
.nav-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.nav-divider {
  height: 1px; margin: 0.5rem 1rem;
  background: repeating-linear-gradient(90deg, rgba(255,212,59,0.2) 0px, rgba(255,212,59,0.2) 8px, transparent 8px, transparent 12px);
}
.sidebar-footer {
  margin-top: auto; padding: 1rem;
  border-top: 1px solid rgba(255,212,59,0.1);
  font-size: 11px; color: var(--text-muted);
}
/* Main */
.main {
  margin-left: var(--sidebar-width); padding: 30px; padding-bottom: 60px;
  min-height: 100vh;
}
.main header h2 {
  font-size: 22px; font-weight: 600; color: #f0f6fc;
  padding-bottom: 8px;
  border-bottom: 2px solid transparent;
  border-image: linear-gradient(90deg, rgba(255,212,59,0.4), transparent 60%) 1;
}
.main header .desc { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
/* Sections */
.section { display: none; }
.section.active { display: block; }
/* Cards */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 20px; margin-bottom: 20px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.card:hover {
  border-color: rgba(255,212,59,0.15);
  box-shadow: 0 0 20px rgba(255,212,59,0.03);
}
.card-title {
  font-size: 14px; font-weight: 600; margin-bottom: 12px;
  color: var(--text-primary);
}
.card-subtitle { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; }
/* KPI Row */
.kpi-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.kpi {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; text-align: center;
  border-top: 2px solid rgba(255,212,59,0.2);
}
.kpi .label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--text-muted); margin-bottom: 6px;
}
.kpi .value { font-size: 22px; font-weight: 700; }
.kpi .sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
/* Form Elements */
.form-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
}
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--text-muted); font-weight: 500;
}
.form-group input, .form-group select, .form-group textarea {
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 10px; color: var(--text-primary);
  font-family: var(--font-stack); font-size: 14px;
  transition: border-color 0.15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--accent-orange);
}
.form-group input::placeholder { color: var(--text-muted); }
.form-group .computed {
  background: transparent; border: 1px solid transparent;
  color: var(--accent-green); font-weight: 600; padding: 8px 0;
}
/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-primary);
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: all 0.15s; font-family: var(--font-stack);
}
.btn:hover { border-color: var(--border-hover); background: rgba(255,255,255,0.03); }
.btn-primary {
  background: linear-gradient(135deg, rgba(255,212,59,0.12), rgba(255,169,77,0.12));
  border-color: rgba(255,212,59,0.3); color: var(--accent-yellow);
}
.btn-primary:hover { background: linear-gradient(135deg, rgba(255,212,59,0.22), rgba(255,169,77,0.22)); }
.btn-danger {
  background: rgba(255,107,107,0.1); border-color: rgba(255,107,107,0.25);
  color: var(--accent-red);
}
.btn-sm { padding: 5px 10px; font-size: 12px; }
/* Tables */
.data-table {
  width: 100%; border-collapse: collapse; font-size: 0.82rem;
}
.data-table th {
  text-align: right; padding: 8px 10px; font-weight: 500;
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.04em; font-size: 0.7rem;
  border-bottom: 1px solid var(--border);
}
.data-table th:first-child { text-align: left; }
.data-table td {
  padding: 8px 10px; text-align: right;
  border-bottom: 1px solid var(--border);
}
.data-table td:first-child { text-align: left; }
.data-table tr:hover { background: rgba(255,255,255,0.02); }
.data-table .total-row {
  font-weight: 600; border-top: 2px solid var(--border);
  background: rgba(255,255,255,0.03);
}
.data-table .positive { color: var(--accent-green); }
.data-table .negative { color: var(--accent-red); }
.data-table .highlight { color: var(--accent-orange); }
/* Toggle */
.toggle-group {
  display: inline-flex; border: 1px solid var(--border); border-radius: 6px;
  overflow: hidden;
}
.toggle-btn {
  padding: 5px 12px; font-size: 12px; cursor: pointer;
  background: transparent; color: var(--text-secondary);
  border: none; font-family: var(--font-stack);
  transition: all 0.15s;
}
.toggle-btn.active {
  background: rgba(255,169,77,0.15); color: var(--accent-orange);
}
.toggle-btn.dest-btn.active {
  background: rgba(255,212,59,0.15); color: var(--accent-yellow);
}
/* Channel Cards */
.channel-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
.channel-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px;
}
.channel-card .ch-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.channel-card .ch-name { font-size: 14px; font-weight: 600; }
.channel-card .ch-type {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.ch-type.flower { background: rgba(105,219,124,0.15); color: var(--accent-green); }
.ch-type.trim { background: rgba(188,140,255,0.15); color: var(--accent-purple); }
.ch-type.either { background: rgba(88,166,255,0.15); color: var(--accent-blue); }
.ch-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ch-field label { font-size: 10px; color: var(--text-muted); display: block; }
.ch-field input, .ch-field select {
  width: 100%; background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 4px; padding: 5px 8px; color: var(--text-primary);
  font-size: 13px; font-family: var(--font-stack);
}
.ch-field input:focus, .ch-field select:focus {
  outline: none; border-color: var(--accent-orange);
}
/* Scenario Allocator */
.alloc-row {
  display: grid; grid-template-columns: 180px 100px 80px 100px 100px 100px 100px 120px;
  gap: 8px; align-items: center; padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.alloc-row.header {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--text-muted); font-weight: 500;
  border-bottom: 1px solid var(--border);
}
.alloc-input {
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 4px; padding: 5px 8px; color: var(--text-primary);
  font-size: 13px; width: 100%; font-family: var(--font-stack);
  text-align: right;
}
.alloc-input:focus { outline: none; border-color: var(--accent-orange); }
.alloc-val { font-size: 13px; text-align: right; }
/* Opportunity cost callout */
.opp-cost-badge {
  display: inline-block; padding: 2px 6px; border-radius: 4px;
  font-size: 11px; font-weight: 500;
}
.opp-cost-badge.gain {
  background: rgba(105,219,124,0.12); color: var(--accent-green);
}
.opp-cost-badge.loss {
  background: rgba(255,107,107,0.12); color: var(--accent-red);
}
/* Compare */
.compare-grid {
  display: grid; gap: 16px;
}
.compare-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.compare-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.scenario-select {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
}
.scenario-chip {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px;
  font-size: 12px; cursor: pointer; background: var(--bg-card);
  color: var(--text-secondary); transition: all 0.15s;
}
.scenario-chip.selected {
  border-color: var(--accent-orange); color: var(--accent-orange);
  background: rgba(255,169,77,0.1);
}
/* Quote Book */
.quote-entry {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px; margin-bottom: 10px;
}
.quote-entry .q-vendor { font-weight: 600; font-size: 14px; }
.quote-entry .q-date { font-size: 11px; color: var(--text-muted); }
.quote-entry .q-desc { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }
.quote-entry .q-channel {
  display: inline-block; font-size: 10px; padding: 2px 8px;
  border-radius: 10px; margin-top: 6px;
  background: rgba(88,166,255,0.12); color: var(--accent-blue);
}
/* Unallocated bar */
.unalloc-bar {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 16px; margin-bottom: 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.unalloc-bar .bar-track {
  flex: 1; height: 6px; background: var(--border); border-radius: 3px;
  margin: 0 16px; overflow: hidden;
}
.unalloc-bar .bar-fill {
  height: 100%; border-radius: 3px; transition: width 0.3s;
}
/* Extraction special */
.extraction-config {
  background: rgba(188,140,255,0.06); border: 1px solid rgba(188,140,255,0.2);
  border-radius: 8px; padding: 16px; margin-top: 12px;
}
/* Responsive */
.hamburger {
  display: none; position: fixed; top: 12px; left: 12px;
  z-index: 20; background: var(--bg-secondary);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 8px; cursor: pointer; color: var(--text-primary);
  font-size: 18px;
}
.sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 9;
}
@media (max-width: 768px) {
  .hamburger { display: block; }
  .sidebar { transform: translateX(-100%); transition: transform 0.2s; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .main { margin-left: 0; padding: 20px; padding-top: 50px; }
  .alloc-row { grid-template-columns: 1fr; }
  .kpi-row { grid-template-columns: 1fr 1fr; }
  .compare-grid.cols-2, .compare-grid.cols-3 { grid-template-columns: 1fr; }
}
/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
/* Tabs within sections */
.tab-bar {
  display: flex; gap: 0; border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.tab-btn {
  padding: 10px 16px; font-size: 13px; cursor: pointer;
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--text-secondary); font-family: var(--font-stack);
  transition: all 0.15s;
}
.tab-btn:hover { color: var(--text-primary); }
.tab-btn.active {
  color: var(--accent-orange); border-bottom-color: var(--accent-orange);
}
/* Scenario name input */
.scenario-name-input {
  background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--text-primary); font-size: 18px; font-weight: 600;
  padding: 4px 0; width: 300px; font-family: var(--font-stack);
}
.scenario-name-input:focus { outline: none; border-bottom-color: var(--accent-orange); }
/* Action bar */
.action-bar {
  display: flex; gap: 8px; margin-bottom: 20px; align-items: center;
}
.action-bar .spacer { flex: 1; }
/* Info tooltip */
.info-tip {
  position: relative; display: inline-flex; align-items: center;
  justify-content: center; width: 16px; height: 16px;
  border-radius: 50%; background: var(--border);
  color: var(--text-muted); font-size: 10px; cursor: help;
  margin-left: 4px;
}
.info-tip:hover::after {
  content: attr(data-tip); position: absolute; bottom: calc(100% + 6px);
  left: 50%; transform: translateX(-50%); padding: 6px 10px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 6px; font-size: 11px; color: var(--text-secondary);
  white-space: nowrap; z-index: 100;
}
/* Delete icon */
.del-btn {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 14px; padding: 2px 4px;
}
.del-btn:hover { color: var(--accent-red); }
</style>
</head>
